<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Secure Message</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /*=========================
                RESET
        =========================*/

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            min-height: 100vh;

            background: #101826;

            color: #fff;

            overflow: hidden;

        }

        /*=========================
            CONTAINER
        =========================*/

        .container {

            width: 100%;

            height: 100vh;

            padding: 20px;

        }


        /*=========================
                HEADER
        =========================*/

        header {

            width: 100%;

            height: 70px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 0 25px;

            background: rgba(255, 255, 255, .05);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 18px;

            margin-bottom: 20px;

        }

        .logo {

            display: flex;

            align-items: center;

            gap: 12px;

            font-size: 25px;

            font-weight: bold;

        }

        .logo i {

            color: #17d67d;

            font-size: 30px;

        }

        .header-right {

            display: flex;

            align-items: center;

            gap: 15px;

        }

        .header-right button {

            width: 48px;

            height: 48px;

            border: none;

            border-radius: 50%;

            background: #1b2437;

            color: #fff;

            cursor: pointer;

            transition: 0.3s;

            font-size: 18px;

        }

        #profileBtn {

            width: 120px;

            border-radius: 50px;

            display: flex;

            justify-content: center;

            align-items: center;

            gap: 8px;

        }

        .header-right button:hover {

            background: #17d67d;

            transform: translateY(-2px);

        }

        .header-right button:active {

            transform: scale(0.95);

        }

        /*=========================
                MAIN
        =========================*/

        main {

            display: grid;

            grid-template-columns: 50px 1fr 360px;

            gap: 20px;

            transition: .4s;

        }

        body.second-main main {

            display: grid;

            grid-template-columns: 50px 240px 1fr 360px;

            gap: 20px;

        }

        /*=========================
                menu
        =========================*/

        .menu {

            display: flex;

            justify-content: center;

            text-align: center;

            background: rgba(255, 255, 255, .05);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 5px;

            padding: 5px;

            height: calc(100vh - 130px);

            overflow-y: auto;

        }

        .btn {

            height: 35px;

            font-size: 1.5em;

            border: none;

            background: none;

            margin-top: 10px;

            color: #b8b8b8;

            justify-content: center;

            align-items: center;

            transition: .4s;

        }

        .btn:hover {

            color: #10c26f;

            transform: translateY(-2px);
            transition: .4s;

        }

        .btn:active {

            transform: scale(.98);
            transition: .3s;

        }

        /*=========================
                SIDEBAR
        =========================*/

        .sidebar {

            display: none;

        }

        body.second-main .sidebar {

            display: inline;

            background: rgba(255, 255, 255, .05);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 20px;

            padding: 20px;

            height: calc(100vh - 130px);

            overflow: hidden;

        }

        .sidebar h2 {

            font-size: 28px;

        }

        ul {

            align-items: center;

            gap: 15px;

            padding: 8px;

            border-radius: 15px;

            cursor: pointer;

            margin-bottom: 12px;

            font-size: 20px;

        }

        li {

            height: 60px;

            padding: 4px 0;

            list-style: none;

            overflow-y: auto;

            overflow-x: hidden;

        }

        .sidebar li button {

            width: 180px;

            height: 45px;

            display: flex;

            align-items: center;

            gap: 10px;

            overflow: hidden;

            cursor: pointer;

        }

        .sidebar li button:hover {

            background: rgba(255, 255, 255, .08);

            border-radius: 15px;

            transform: translateY(-5px);

            transition: .3s;
        }

        .sidebar li button:hover .text-box span {
            animation: marquee 9s linear infinite;
        }

        .sidebar li button:active {
            background-color: #17d67d;

            transform: scale(.96);
            transition: 0.3s;

        }

        .text-box {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
        }

        .text-box span {
            display: inline-block;
        }

        @keyframes marquee {

            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-100%);
            }

        }

        /*=========================
            SEND MESSAGE PANEL
        =========================*/

        .send-message {

            background: rgba(255, 255, 255, .05);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 20px;

            padding: 15px;

            height: calc(100vh - 130px);

            overflow-y: auto;

        }

        .s_m_header {

            display: grid;

            grid-template-columns: 1fr 150px;

            align-items: center;

            justify-content: center;

        }

        .s_m_header h2 {

            font-size: 30px;

            margin-bottom: 25px;

        }

        .send-message .s_m_header input {

            height: 20px;

            border: 1px solid #17d67d;

            box-shadow: 0 0 10px rgba(23, 214, 125, .35);

        }

        .send-message label {

            display: block;

            margin-bottom: 8px;

            margin-top: 18px;

            font-size: 17px;

            font-weight: 600;

        }

        .send-message input,
        .send-message textarea {

            width: 100%;

            padding: 15px;

            border: none;

            outline: none;

            border-radius: 14px;

            background: #1b2437;

            color: #fff;

            border: 1px solid rgba(255, 255, 255, .08);

            transition: .3s;

            font-size: 16px;

        }

        .send-message input::placeholder,
        .send-message textarea::placeholder {

            color: #b8b8b8;

        }

        .send-message input:focus,
        .send-message textarea:focus {

            border: 1px solid #17d67d;

            box-shadow: 0 0 10px rgba(23, 214, 125, .35);

        }

        .send-message textarea {

            resize: none;

            height: 115px;

        }

        .sendBtn {

            width: 100%;

            margin-top: 25px;

            padding: 16px;

            border: none;

            border-radius: 14px;

            background: #17d67d;

            color: #fff;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

            transition: .3s;

        }

        .sendBtn i {

            margin-right: 8px;

        }

        .sendBtn:hover {

            background: #10c26f;

            transform: translateY(-2px);

        }

        .sendBtn:active {

            transform: scale(.97);

        }

        /*=========================
            DECRYPT PANEL
        =========================*/

        .decrypt-panel {

            background: rgba(255, 255, 255, .05);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 20px;

            padding: 25px;

            height: calc(100vh - 130px);

            overflow: hidden;

        }

        .decrypt-panel h2 {

            font-size: 30px;

            margin-bottom: 25px;

        }


        /*=========================
            MESSAGE LIST
        =========================*/

        .message-list {

            display: block;

            margin-bottom: 25px;

        }

        body.out_seen .message-list {

            display: none;

        }

        .message-list ul {
            display: none;
            width: 100%;
            min-height: 180px;
            padding: 0;
            margin: 0;
            overflow-y: auto;
        }

        .message-list ul.active {
            display: block;
        }

        .message-list li {
            display: block;
            width: 100%;
            height: 300px;
            margin-bottom: 8px;
            list-style: none;
        }

        .message-list .files {

            display: flex;
        }

        .message-list-btn {

            display: flex;

            justify-content: space-around;

            border-bottom: 1px dotted #17d67d;

            border-top: 1px dotted #17d67d;

            padding: 10px 0px;

        }

        .message-list-btn .r_f_btn,
        .message-list-btn .s_f_btn {

            background: none;

            border: none;

            color: #edf2f8;

            transition: .4s;

        }

        body.underline1 .r_f_btn {

            border-bottom: 2px dotted #10c26f;

            padding: 2px;

        }

        body.underline2 .s_f_btn {

            border-bottom: 2px dotted #10c26f;

            padding: 2px;

        }

        .message-list-btn button:hover {

            color: #17d67d;

            text-shadow: rgba(23, 214, 125, .35);

            transform: translateY(-2px);
            transition: 0.4s;
        }

        .message-list-btn button:active {

            transform: scale(.97);
            transition: .4s;
        }

        li button {

            display: flex;

            background: none;

            border: none;

            font-size: 1em;

            padding: 15px 10px;

            border-radius: 15px;

            color: #f5f7fb;

            transition: .4s;

            overflow: hidden;

        }

        li button:hover {

            background: rgba(255, 255, 255, .08);

            transform: translateX(5px);
            transition: .4s;

        }

        .files button:hover .text-box span {

            animation: marquee 9s linear infinite;

        }

        li button:active {

            background-color: #17d67d;

            transform: scale(.96);
            transition: 0.3s;

        }

        .files {

            display: flex;

            align-items: center;

        }

        .d_btn {

            display: flex;

            align-items: center;

            border: none;

            color: #17d67d;

            font-size: 0.6em;

            width: 30px;

            height: 30px;

            transition: .4s;

        }

        .message-list i {

            margin-right: 12px;

            color: #17d67d;

            font-size: 1.5em;

        }

        /*=========================
                  OUTPUT
        =========================*/

        .out {

            display: none;

        }

        body.out_seen .out {

            display: block;

        }

        .ob-fn {

            display: flex;

            justify-content: space-between;

        }

        .ob-fn .out_btn {

            background-color: #10c26f;

            color: aliceblue;

            border: 1px solid #17d67d;

            border-radius: 10px;

            padding: 5px 10px;

            font-size: 1.1em;

            transition: .4s;

        }

        .ob-fn .out_btn:hover {

            background-color: #17d67d;

            color: #101826;

            transform: translateY(-3px);
            transition: .4s;

        }

        .ob-fn .out_btn:active {

            transform: scale(.97);
        }

        .ob-fn .f_n {

            outline: none;

            background: none;

            width: 50%;

            height: 10px;

            border-radius: 0px 10px 0px 10px;

            border-color: #17d67d;

            box-shadow: 0 0 10px rgba(23, 214, 125, .35);

        }

        .decrypt-panel label {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-top: 18px;

            margin-bottom: 8px;

            font-size: 17px;

            font-weight: 600;

        }

        .decrypt-panel input,
        .decrypt-panel textarea {

            width: 100%;

            padding: 15px;

            background: #1b2437;

            color: #fff;

            border: none;

            outline: none;

            border-radius: 14px;

            border: 1px solid rgba(255, 255, 255, .08);

            transition: .3s;

            font-size: 16px;

        }

        .decrypt-panel input:focus {

            border-color: #17d67d;

            box-shadow: 0 0 10px rgba(23, 214, 125, .35);

        }

        .decrypt-panel textarea {

            resize: none;

            height: 150px;

        }

        .decryptBtn {

            width: 100%;

            margin-top: 22px;

            padding: 16px;

            border: none;

            border-radius: 14px;

            background: #17d67d;

            color: #fff;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

            transition: .3s;

        }

        .decryptBtn i {

            margin-right: 8px;

        }

        .decryptBtn:hover {

            background: #10c26f;

            transform: translateY(-2px);

        }

        .decryptBtn:active {

            transform: scale(.97);

        }

        /*=========================
            PROFILE POPUP
        =========================*/

        .profile-popup {

            position: absolute;

            top: 90px;

            right: 20px;

            width: 280px;

            background: rgba(255, 255, 255, .08);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .1);

            border-radius: 20px;

            padding: 25px;

            text-align: center;

            display: none;

            animation: popup .3s ease;

            z-index: 999;

        }

        .profile-popup h3 {

            margin-bottom: 6px;

        }

        .profile-popup hr {

            height: 1px;

            background: rgba(255, 255, 255, .1);

            margin: 15px 0;

        }

        .profile-popup button {

            width: 100%;

            margin-top: 10px;

            padding: 12px;

            border: none;

            border-radius: 12px;

            background: #1b2437;

            color: #fff;

            cursor: pointer;

            transition: .3s;

        }

        .profile-popup button:hover {

            background: #17d67d;

        }


        /*=========================
            NOTIFICATION
        =========================*/

        .notification-box1 {

            position: absolute;

            top: 90px;

            right: 330px;

            width: 300px;

            background: rgba(255, 255, 255, .08);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .1);

            border-radius: 18px;

            padding: 20px;

            display: none;

            animation: popup .3s ease;

            z-index: 999;

        }

        .notification-box1 h3 {

            margin-bottom: 15px;

        }

        .notification-box1 p {

            margin: 12px 0;

            color: #ddd;

        }

        .notification-box2 {

            position: absolute;

            top: 90px;

            right: 330px;

            width: 300px;

            background: rgba(255, 255, 255, .08);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .1);

            border-radius: 18px;

            padding: 20px;

            display: none;

            animation: popup .3s ease;

            z-index: 999;

        }

        .notification-box2 h3 {

            margin-bottom: 15px;

        }

        .notification-box2 p {

            margin: 12px 0;

            color: #ddd;

        }

        .notification-box3 {

            position: absolute;

            top: 90px;

            right: 330px;

            width: 300px;

            background: rgba(255, 255, 255, .08);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, .1);

            border-radius: 18px;

            padding: 20px;

            display: none;

            animation: popup .3s ease;

            z-index: 999;

        }

        .notification-box3 h3 {

            margin-bottom: 15px;

        }

        .notification-box3 p {

            margin: 12px 0;

            color: #ddd;

        }


        /*=========================
                ANIMATION
        =========================*/

        @keyframes popup {

            from {

                opacity: 0;

                transform: translateY(-15px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }


        /*=========================
            LIGHT MODE
        =========================*/

        body.light {

            background: #edf2f8;

            color: #222;

        }

        body.light header,
        body.light .sidebar,
        body.light .send-message,
        body.light .decrypt-panel,
        body.light .profile-popup,
        body.light .notification-box1,
        body.light .notification-box2,
        body.light .notification-box3,
        body.light .menu {

            background: #ffffff;

            color: #222;

            border: 1px solid #222;

        }

        body.light input,
        body.light textarea,
        body.light .message {

            background: #f5f7fb;

            color: #222;

            border: 1px solid #222;

        }

        body.light .sidebar button,
        body.light .message-list button,
        body.light .menu button {

            color: #101826;

        }

        body.light li button:hover,
        body.light .menu button:hover {

            background: rgba(16, 16, 16, 0.1);

        }

        body.light li button:active,
        body.light .menu button:active {

            background: #17d67d;

            color: #fff;

        }

        body.light .send-message .s_m_header input::placeholder {

            color: #101826;

        }

        /*=========================
                SCROLLBAR
        =========================*/

        ::-webkit-scrollbar {

            width: 8px;

        }

        ::-webkit-scrollbar-thumb {

            background: #17d67d;

            border-radius: 20px;

        }

        ::-webkit-scrollbar-track {

            background: transparent;

        }


        /*=========================
            RESPONSIVE
        =========================*/

        @media(max-width:1200px) {

            body {
                overflow: auto;
            }

            main {

                grid-template-columns: 1fr;

            }

            .send-message,
            .decrypt-panel {

                height: 450px;

                overflow-y: auto;

            }

        }

        @media(max-width:768px) {

            body {
                overflow: auto;
            }

            header {

                flex-direction: column;

                gap: 15px;

                height: auto;

                padding: 20px;

            }

            .logo {

                font-size: 20px;

            }

            .header-right {

                width: 100%;

                justify-content: center;

                flex-wrap: wrap;

            }

            .sidebar {

                height: 400px;

            }

        }
    </style>
</head>

<body>

    <form action="/main_web" method="post">

        <div class="container">

            <!-- ================= HEADER ================= -->

            <header>

                <div class="logo">

                    <i class="fa-solid fa-shield-halved"></i>

                    <span>Secure Message</span>

                </div>

                <div class="header-right">

                    <button id="notificationBtn" type="button"><i class="fa-solid fa-bell"></i> </button>

                    <button id="themeBtn" type="button">🌙</button>

                    <button id="profileBtn" type="button"><i class="fa-solid fa-user"></i> Profile</button>

                </div>

            </header>

            <!-- ================= MAIN ================= -->

            <main>

                <!-- ========== menu =========== -->

                <div class="menu">
                    <button id="sidebar_btn" class="btn" type="button"><i
                            class="fa-duotone fa-solid fa-address-book"></i></button>
                </div>

                <!-- ========== SIDEBAR ========== -->

                <aside class="sidebar">

                    <h2>Contacts</h2>

                    <ul id="contacts-list">

                    </ul>

                </aside>
                <!-- ========== SEND MESSAGE ========== -->

                <section class="send-message">

                    <div class="s_m_header">
                        <h2>Send Message</h2>
                        <input name="address_html" type="text" placeholder="...@smail.com"
                            value="{{ contact_name or '' }}">
                    </div>

                    <label>File Name</label>
                    <input name="filename_html" type="text" placeholder="Enter file name">

                    <label for="">Password</label>
                    <input name="password_encrypt_html" type="password" placeholder="12345">

                    <label>Message</label>
                    <textarea name="text_html" placeholder="Write your secure message..."></textarea>

                    <button name="action_html" value="sent" class="sendBtn" type="submit"><i
                            class="fa-solid fa-paper-plane"></i> Send Encrypted </button>

                </section>

                <!-- ========== DECRYPT PANEL ========== -->

                <section class="decrypt-panel">

                    <div class="message-list">

                        <h2>Message Encryption</h2>

                        <div class="message-list-btn">
                            <button id="r_f_btn" class="r_f_btn" type="button">Received Files</button>
                            <button id="s_f_btn" class="s_f_btn" type="button">Send Files</button>
                        </div>

                        <ul id="r_f_list" class="active">
                            <li id="received-files-list">

                            </li>
                        </ul>

                        <ul id="s_f_list">
                            <li>
                                {% for file in get_sent_files %}
                                <div class="files">
                                    <button type="submit" class="out_seen2" name="read_file_id" value="{{ file.id }}">
                                        <i class="fa-solid fa-file"></i>
                                        <div class="text-box">
                                            <span>{{ file['file_name'] }}</span>
                                        </div>
                                    </button>
                                    <button name="delete_file_id" value="{{ file.id }}" class="d_btn"><i
                                            class="fa-solid fa-trash" style="color: #ffffff;"></i></button>
                                </div>
                                {% endfor %}
                            </li>
                        </ul>

                    </div>

                    <!--=== output ===-->
                    <div class="out">

                        <div class="ob-fn">

                            <button class="out_seen3" type="button" class="out_btn"><i
                                    class="fa-solid fa-arrow-left"></i></button>

                            <input type="text" class="f_n" placeholder="File name..." value="{{file_name or ''}}"
                                readonly>

                        </div>

                        <label>Output</label>

                        <textarea readonly>{{decrypted_text}}</textarea>

                        <label>Password</label>

                        <input name="password_decrypt_html" type="password" placeholder="Enter password" id="noti">

                        <button name="action_html" value="decrypt" class="decryptBtn" type="submit"><i
                                class="fa-solid fa-lock-open"></i> Decrypt</button>

                    </div>

                </section>

            </main>

            <!-- ========== PROFILE POPUP ========== -->

            <div class="profile-popup">

                <i class="fa-solid fa-circle-user" style="font-size: 1.8em;"></i>

                <h3>{{ user_email }}</h3>

                <hr>

                <button name="logout_button" value="logout">Logout</button>

            </div>

            <!-- ========== NOTIFICATION ========== -->
            {% if status_msg %}
            <div class="notification-box1">
                <h3><i class="fa-solid fa-bell" style="margin-right: 10px;"></i>Notifications</h3>
                <p>{{status_msg}}</p>
            </div>
            {% endif %}
            <div class="notification-box2">
                <h3><i class="fa-solid fa-bell" style="margin-right: 10px;"></i>Notifications</h3>
                <p>{{status_msg}}</p>
            </div>
            <div class="notification-box3">
                <h3><i class="fa-solid fa-bell" style="margin-right: 10px;"></i>Notifications</h3>
                <p id="msg">{{status_msg}}</p>
            </div>
        </div>

        <script src="script.js"></script>
        <script>
            // Contacts List
            const notificationBox3 = document.querySelector(".notification-box3");

            function loadContacts() {

                fetch("/contacts")
                    .then(res => res.json())
                    .then(data => {

                        let oldCount = Number(localStorage.getItem("count") || 0);
                        let newCount = data.contacts.length;
                        let msg = document.getElementById("msg");

                        if (newCount > oldCount) {

                            notificationBox3.style.display = "block";
                            msg.textContent = `${data.contacts[newCount - 1].email.split("@")[0]} has been added to your contacts.`;
                            setTimeout(() => {
                                notificationBox3.style.display = "none";
                            }, 3000);

                        }

                        localStorage.setItem("count", newCount);

                        const ul = document.getElementById("contacts-list");
                        ul.innerHTML = "";

                        data.contacts.forEach(user => {

                            ul.innerHTML += `
                                <li>
                                    <button class="user-btn"
                                        type="submit"
                                        name="contact_name"
                                        value="${user.id}|${user.email}">

                                        <i class="fa-solid fa-circle-user"></i>

                                        <div class="text-box">
                                            <span>${user.email.split("@")[0]}</span>
                                        </div>

                                    </button>
                                </li>
                            `;

                        });

                    });

            }

            loadContacts();
            setInterval(loadContacts, 2000);


            function checkReceivedFiles() {
                fetch("/receive_files")
                    .then(res => res.json())
                    .then(data => {
                        const file_list = data.received_files;

                        if (!file_list || file_list.length === 0) return;

                        const savedList = JSON.parse(localStorage.getItem("myList") || "[]");

                        if (savedList.includes(file_list[0].id)) {
                            console.log("");
                        } else {
                            localStorage.setItem("sender_email", file_list[0].sender_email);
                            notificationBox3.style.display = "block";
                            msg.textContent = `${localStorage.getItem('sender_email')} sent message to you!`;
                            setTimeout(() => {
                                notificationBox3.style.display = "none";
                            }, 3000);
                        }

                        const fileIds = file_list.map(file => file.id);
                        localStorage.setItem("myList", JSON.stringify(fileIds));

                        const fileContainer = document.getElementById("received-files-list");
                        fileContainer.innerHTML = "";

                        file_list.forEach(file => {
                            fileContainer.innerHTML += `
                            <div class="files">
                                <button type="submit" class="out_seen1" name="read_file_id" value="${file.id}">
                                    <i class="fa-solid fa-file"></i>
                                    <div class="text-box">
                                        <span>${file.file_name}</span>
                                    </div>
                                </button>
                                <button name="delete_file_id" value="${file.id}" class="d_btn">
                                    <i class="fa-solid fa-trash" style="color: #ffffff;"></i>
                                </button>
                            </div>
                        `;
                        });

                    })
                    .catch(err => console.error("Error fetching files:", err));
            }

            checkReceivedFiles();
            setInterval(checkReceivedFiles, 2000);

            // Theme Button

            const themeBtn = document.getElementById("themeBtn");

            // Save Theme
            let theme = localStorage.getItem("theme");

            // Load Theme
            if (theme === "light") {

                document.body.classList.add("light");

                themeBtn.innerHTML = "🔆";

            } else {

                themeBtn.innerHTML = "🌙";

            }

            // Click Event
            themeBtn.addEventListener("click", () => {

                document.body.classList.toggle("light");


                if (document.body.classList.contains("light")) {

                    localStorage.setItem("theme", "light");

                    themeBtn.innerHTML = "🔆";

                } else {

                    localStorage.setItem("theme", "dark");

                    themeBtn.innerHTML = "🌙";

                }

            });

            // =========================
            // Profile & Notification
            // =========================

            const profileBtn = document.getElementById("profileBtn");
            const profilePopup = document.querySelector(".profile-popup");

            const notificationBtn = document.getElementById("notificationBtn");
            const notificationBox1 = document.querySelector(".notification-box1");
            const notificationBox2 = document.querySelector(".notification-box2");


            // =========================
            // Profile Button
            // =========================

            profileBtn.addEventListener("click", (e) => {

                e.stopPropagation();


                if (profilePopup.style.display === "block") {

                    profilePopup.style.display = "none";

                } else {

                    profilePopup.style.display = "block";

                }

            });


            // =========================
            // Notification Button
            // =========================

            if (notificationBtn && notificationBox2) {
                notificationBtn.addEventListener("click", (e) => {
                    e.stopPropagation();

                    if (notificationBox2.style.display === "block") {
                        notificationBox2.style.display = "none";
                    } else {
                        notificationBox2.style.display = "block";
                    }
                });
            }

            try {
                if (notificationBox1) {
                    notificationBox1.style.display = "block";
                    setTimeout(() => {
                        notificationBox1.style.display = "none";
                    }, 3000);
                } else {
                    notificationBox1.style.display = "none";
                }
            } catch (error) {
                notificationBox2.style.display = "none";
            }

            // =========================
            // Click Outside
            // =========================

            document.addEventListener("click", () => {

                profilePopup.style.display = "none";

                notificationBox2.style.display = "none";

            });


            // Popup

            profilePopup.addEventListener("click", (e) => {

                e.stopPropagation();

            });

            notificationBox2.addEventListener("click", (e) => {

                e.stopPropagation();

            });

            //R_F,S_F Control
            const r_f_list = document.getElementById("r_f_list");
            const r_f_btn = document.getElementById("r_f_btn");

            const s_f_list = document.getElementById("s_f_list");
            const s_f_btn = document.getElementById("s_f_btn");

            let r_s_btn = localStorage.getItem("r_s_btn") || 1;

            if (r_s_btn == 1) {

                s_f_list.classList.remove("active");
                r_f_list.classList.add("active");

                document.body.classList.add("underline1");
                document.body.classList.remove("underline2");

            } else {

                r_f_list.classList.remove("active");
                s_f_list.classList.add("active");

                document.body.classList.add("underline2");
                document.body.classList.remove("underline1");

            };


            r_f_btn.addEventListener("click", (e) => {
                e.stopPropagation();

                s_f_list.classList.remove("active");
                r_f_list.classList.toggle("active");

                document.body.classList.add("underline1");
                document.body.classList.remove("underline2");

                localStorage.setItem("r_s_btn", 1);

            });

            s_f_btn.addEventListener("click", (e) => {
                e.stopPropagation();

                r_f_list.classList.remove("active");
                s_f_list.classList.toggle("active");

                document.body.classList.add("underline2");
                document.body.classList.remove("underline1");

                localStorage.setItem("r_s_btn", 2);

            });

            //context control
            const sidebar_btn = document.getElementById("sidebar_btn");

            sidebar_btn.addEventListener("click", () => {
                document.body.classList.toggle("second-main");
            });

            //Output Seen
            function out_seen(isOpen) {
                if (isOpen) {
                    document.body.classList.add("out_seen");
                } else {
                    document.body.classList.remove("out_seen");
                }
            };

            const isReceivedFile = localStorage.getItem('r_f') == 1;
            const isSentFile = localStorage.getItem('s_f') == 1;

            if (isReceivedFile || isSentFile) {
                out_seen(true);
            } else {
                localStorage.setItem("r_f", 0);
                localStorage.setItem("s_f", 0);
                out_seen(false);
            }

            document.addEventListener("click", (e) => {

                if (e.target.classList.contains("out_seen1") || e.target.closest(".out_seen1")) {
                    localStorage.setItem("r_f", 1);
                    out_seen(true);
                    return;
                }

                if (e.target.classList.contains("out_seen2") || e.target.closest(".out_seen2")) {
                    localStorage.setItem("s_f", 1);
                    out_seen(true);
                    return;
                }

                if (e.target.classList.contains("out_seen3") || e.target.closest(".out_seen3")) {
                    localStorage.setItem("r_f", 0);
                    localStorage.setItem("s_f", 0);
                    out_seen(false);
                    return;
                }

            });

        </script>

    </form>

</body>

</html>
